<template id="view-landing">
  <section class="hero">
    <div class="hero__inner">
      <p class="hero__eyebrow">A new kind of social — async, soulful, slow.</p>
      <h1 class="hero__title">
        いまの<span class="grad">想い</span>を、<br />
        <span class="grad-2">未来</span>へ届けるSNS。
      </h1>
      <p class="hero__lead">
        Echo (エコー) は、未来の日付に「開封」されるメッセージを世界へ投稿できる新しいSNSです。<br />
        1日後の自分、1年後の恋人、10年後の世界。あなたの<b>今</b>が、未来で誰かの心を揺らす。
      </p>
      <div class="hero__cta">
        <a class="btn btn--primary" href="#/compose">未来へメッセージを送る</a>
        <a class="btn btn--ghost" href="#/timeline">いま開封中の声を聴く →</a>
      </div>
      <div class="hero__counters" id="heroCounters" aria-live="polite">
        <div class="counter"><div class="counter__num" data-key="sealed">—</div><div class="counter__label">封印中</div></div>
        <div class="counter"><div class="counter__num" data-key="opened">—</div><div class="counter__label">開封済み</div></div>
        <div class="counter"><div class="counter__num" data-key="today">—</div><div class="counter__label">今日開く</div></div>
      </div>
    </div>
    <div class="hero__capsules" aria-hidden="true">
      <div class="cap cap--a">2026.04.25</div>
      <div class="cap cap--b">2030.01.01</div>
      <div class="cap cap--c">2027.12.24</div>
      <div class="cap cap--d">2035.08.15</div>
    </div>
  </section>

  <section class="features">
    <h2 class="section-title">なぜ Echo なのか</h2>
    <div class="feat-grid">
      <article class="feat"><div class="feat__icon">⌛</div><h3>時間がコンテンツを熟成させる</h3><p>投稿は指定した未来の日まで誰にも見えません。時が経つほどに、言葉は重みを増します。</p></article>
      <article class="feat"><div class="feat__icon">🌏</div><h3>世界がひとつのタイムラインに</h3><p>開封日を迎えた言葉が、世界中から同時に流れ着きます。今日という日が、誰かの未来でした。</p></article>
      <article class="feat"><div class="feat__icon">🔒</div><h3>完全無料・匿名でOK</h3><p>ログイン不要で投稿可能。鍵付き投稿、特定の人だけが開ける手紙、すべて無料で始められます。</p></article>
      <article class="feat"><div class="feat__icon">💌</div><h3>未来の自分に手紙を</h3><p>「Future Me」モードで、未来の自分宛てに投稿。指定日にこの端末で過去の自分と再会できます。</p></article>
    </div>
  </section>

  <section class="timeline-preview">
    <div class="section-header">
      <h2 class="section-title">今日、世界が開いた声</h2>
      <a href="#/timeline" class="link-arrow">すべて見る →</a>
    </div>
    <div class="post-grid" id="previewGrid"></div>
  </section>

  <section class="cta-band">
    <div class="cta-band__inner">
      <h2>いまの一行が、未来で誰かを救う。</h2>
      <a class="btn btn--primary btn--lg" href="#/compose">無料で未来へ送る</a>
    </div>
  </section>
</template>

<template id="view-timeline">
  <section class="timeline">
    <header class="timeline__header">
      <h1 class="page-title">タイムライン</h1>
      <div class="filters" role="tablist">
        <button class="chip is-active" data-filter="opened" role="tab">開封済み</button>
        <button class="chip" data-filter="today" role="tab">今日開く</button>
        <button class="chip" data-filter="sealed" role="tab">封印中</button>
      </div>
    </header>
    <div class="post-grid" id="timelineGrid"></div>
    <div id="timelineEmpty" class="empty" hidden>
      <p>まだ投稿がありません。最初の一通を未来へ。</p>
      <a class="btn btn--primary" href="#/compose">未来へ送る</a>
    </div>
  </section>
</template>

<template id="view-compose">
  <section class="compose">
    <h1 class="page-title">未来へ送る</h1>
    <form id="composeForm" class="compose__form" novalidate>
      <div class="field">
        <label class="field__label">モード</label>
        <div class="seg">
          <input type="radio" name="mode" id="mWorld" value="world" checked />
          <label for="mWorld">🌏 世界へ</label>
          <input type="radio" name="mode" id="mSelf" value="self" />
          <label for="mSelf">🪞 未来の自分へ</label>
          <input type="radio" name="mode" id="mLocked" value="locked" />
          <label for="mLocked">🔐 合言葉つき</label>
        </div>
        <p class="field__hint" data-hint="world">開封日になると、世界のタイムラインに公開されます。</p>
        <p class="field__hint" data-hint="self" hidden>非公開。指定日にこの端末で再会できます (ローカル保存)。</p>
        <p class="field__hint" data-hint="locked" hidden>合言葉を知っている人だけが開封できます。世界のタイムラインに「鍵付きカプセル」として表示されます。</p>
      </div>

      <div class="field">
        <label class="field__label" for="cTitle">タイトル <span class="opt">(任意)</span></label>
        <input id="cTitle" name="title" type="text" maxlength="60" placeholder="例: 未来の自分へ" />
      </div>

      <div class="field">
        <label class="field__label" for="cBody">本文 <span class="req">必須</span></label>
        <textarea id="cBody" name="body" maxlength="1000" required rows="8" placeholder="今この瞬間の想い、夢、悩み、何でも。1000文字まで。"></textarea>
        <div class="field__counter"><span id="bodyCount">0</span>/1000</div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label class="field__label" for="cAuthor">差出人 <span class="opt">(任意)</span></label>
          <input id="cAuthor" name="author" type="text" maxlength="24" placeholder="匿名" />
        </div>
        <div class="field">
          <label class="field__label" for="cOpenAt">開封日</label>
          <input id="cOpenAt" name="openAt" type="date" required />
          <div class="quick-dates">
            <button type="button" class="chip-mini" data-add="1">+1日</button>
            <button type="button" class="chip-mini" data-add="7">+1週</button>
            <button type="button" class="chip-mini" data-add="30">+1ヶ月</button>
            <button type="button" class="chip-mini" data-add="365">+1年</button>
            <button type="button" class="chip-mini" data-add="1825">+5年</button>
            <button type="button" class="chip-mini" data-add="3650">+10年</button>
          </div>
        </div>
      </div>

      <div class="field" data-when="locked" hidden>
        <label class="field__label" for="cPass">合言葉</label>
        <input id="cPass" name="pass" type="text" maxlength="40" placeholder="開ける人だけが知っている言葉" />
        <p class="field__hint">※ 合言葉は端末上でハッシュ化され、原文は送信されません。</p>
      </div>

      <div class="field">
        <label class="check">
          <input id="cAgree" type="checkbox" required />
          <span>個人情報・他者を傷つける内容を含まないことに同意します。違反する投稿は予告なく削除されます。</span>
        </label>
      </div>

      <div class="compose__actions">
        <button type="submit" class="btn btn--primary btn--lg" id="submitBtn">
          <span class="btn__label">封をして未来へ送る</span>
          <span class="btn__spin" hidden></span>
        </button>
        <p class="form-error" id="formError" role="alert" hidden></p>
      </div>
    </form>
  </section>
</template>

<template id="view-post">
  <section class="postview" id="postViewRoot">
    <a href="#/timeline" class="back-link">← タイムラインへ戻る</a>

</template>
